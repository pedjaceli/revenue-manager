<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Revenue Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-label { color: #cbd5e1; font-size: 0.875rem; }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #6366f1;
      color: #f1f5f9;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .btn-login {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 0.6rem;
      width: 100%;
    }
    .btn-login:hover { background: #4f46e5; color: white; }
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .logo { color: #6366f1; font-size: 2rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="bi bi-graph-up-arrow"></i></div>
    <h1>Revenue Manager</h1>
    <p>Connecte-toi pour accéder à tes revenus.</p>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    {% if request.args.get('reset') %}
    <div style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:0.875rem;">
      <i class="bi bi-check-circle me-2"></i>Mot de passe réinitialisé avec succès. Tu peux te connecter.
    </div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" required />
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
    <a href="/forgot-password" style="display:block;text-align:center;margin-top:1rem;color:#94a3b8;font-size:0.875rem;text-decoration:none;">
      Mot de passe oublié ? <span style="color:#6366f1;">Réinitialiser</span>
    </a>
    <a href="/register" style="display:block;text-align:center;margin-top:1.25rem;color:#94a3b8;font-size:0.875rem;text-decoration:none;">
      Pas encore de compte ? <span style="color:#6366f1;">Créer un compte</span>
    </a>
  </div>
</body>
</html>
