<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Revenue Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-label { color: #cbd5e1; font-size: 0.875rem; }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      caret-color: #f1f5f9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #10b981;
      color: #f1f5f9;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
    }
    .btn-login {
      background: #10b981;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 0.6rem;
      width: 100%;
    }
    .btn-login:hover { background: #059669; color: white; }
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .alert-success {
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .logo { color: #10b981; font-size: 2rem; margin-bottom: 1rem; }
    .lang-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .lang-btn {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover { border-color: #10b981; color: #f1f5f9; }
    .lang-btn.active { background: #10b981; border-color: #10b981; color: white; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
      -webkit-text-fill-color: #f1f5f9 !important;
      transition: background-color 9999s ease-in-out 0s;
    }
    @media (max-width: 575.98px) {
      .login-card { padding: 1.75rem 1.25rem; }
      .lang-btn   { font-size: 0.8rem; padding: 0.4rem 0.25rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="bi bi-graph-up-arrow"></i></div>
    <h1>Revenue Manager</h1>
    <p id="txt-subtitle"></p>

    <div class="lang-toggle">
      <button class="lang-btn" id="btn-en" onclick="switchLang('en')">🇬🇧 English</button>
      <button class="lang-btn" id="btn-fr" onclick="switchLang('fr')">🇫🇷 Français</button>
    </div>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    {% if request.args.get('reset') %}
    <div class="alert-success" id="reset-msg"></div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label" id="lbl-username"></label>
        <input type="text" name="username" class="form-control" required autofocus autocomplete="off" />
      </div>
      <div class="mb-4">
        <label class="form-label" id="lbl-password"></label>
        <input type="password" name="password" class="form-control" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-login" id="btn-submit"></button>
    </form>

    <a href="/forgot-password" id="lnk-forgot" style="display:block;text-align:center;margin-top:1rem;color:#94a3b8;font-size:0.875rem;text-decoration:none;"></a>
    <a href="/register" id="lnk-register" style="display:block;text-align:center;margin-top:1.25rem;color:#94a3b8;font-size:0.875rem;text-decoration:none;"></a>
  </div>

  <script>
    const STRINGS = {
      en: {
        subtitle:  'Sign in to access your revenues.',
        username:  'Username',
        password:  'Password',
        submit:    'Sign in',
        forgot:    'Forgot your password? <span style="color:#10b981;">Reset</span>',
        register:  'No account yet? <span style="color:#10b981;">Create an account</span>',
        reset_ok:  'Password reset successfully. You can now sign in.',
      },
      fr: {
        subtitle:  'Connectez-vous pour accéder à vos données.',
        username:  "Nom d'utilisateur",
        password:  'Mot de passe',
        submit:    'Se connecter',
        forgot:    'Mot de passe oublié ? <span style="color:#10b981;">Réinitialiser</span>',
        register:  'Pas encore de compte ? <span style="color:#10b981;">Créer un compte</span>',
        reset_ok:  'Mot de passe réinitialisé avec succès. Vous pouvez vous connecter.',
      },
    };

    function switchLang(lang) {
      localStorage.setItem('rm-lang', lang);
      applyLang(lang);
    }

    function applyLang(lang) {
      const s = STRINGS[lang] || STRINGS['en'];
      document.getElementById('txt-subtitle').textContent  = s.subtitle;
      document.getElementById('lbl-username').textContent  = s.username;
      document.getElementById('lbl-password').textContent  = s.password;
      document.getElementById('btn-submit').textContent    = s.submit;
      document.getElementById('lnk-forgot').innerHTML      = s.forgot;
      document.getElementById('lnk-register').innerHTML    = s.register;
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
      const resetMsg = document.getElementById('reset-msg');
      if (resetMsg) resetMsg.innerHTML = '<i class="bi bi-check-circle me-2"></i>' + s.reset_ok;
    }

    const savedLang = localStorage.getItem('rm-lang') || 'en';
    applyLang(savedLang);
  </script>
</body>
</html>
