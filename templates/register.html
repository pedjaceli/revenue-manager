<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — Revenue Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
    }
    .login-card h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-label { color: #cbd5e1; font-size: 0.875rem; }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      caret-color: #f1f5f9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #10b981;
      color: #f1f5f9;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2);
    }
    .btn-register {
      background: #10b981;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 0.6rem;
      width: 100%;
    }
    .btn-register:hover { background: #059669; color: white; }
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .logo { color: #10b981; font-size: 2rem; margin-bottom: 1rem; }
    .link-login {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      color: #94a3b8;
      font-size: 0.875rem;
      text-decoration: none;
    }
    .link-login span { color: #10b981; }
    .link-login:hover span { text-decoration: underline; }
    .form-text { color: #64748b; font-size: 0.8rem; }
    .lang-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .lang-btn {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.45rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover { border-color: #10b981; color: #f1f5f9; }
    .lang-btn.active { background: #10b981; border-color: #10b981; color: white; }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
      -webkit-text-fill-color: #f1f5f9 !important;
      transition: background-color 9999s ease-in-out 0s;
    }
    @media (max-width: 575.98px) {
      .login-card { padding: 1.75rem 1.25rem; }
      .lang-btn   { font-size: 0.8rem; padding: 0.4rem 0.25rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">

    <div class="logo"><i class="bi bi-person-plus"></i></div>
    <h1 id="txt-title"></h1>
    <p id="txt-subtitle"></p>

    <div class="lang-toggle">
      <button class="lang-btn" id="btn-en" onclick="switchLang('en')">🇬🇧 English</button>
      <button class="lang-btn" id="btn-fr" onclick="switchLang('fr')">🇫🇷 Français</button>
    </div>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <input type="hidden" name="lang" id="lang-input" value="en" />
      <div class="mb-3">
        <label class="form-label" id="lbl-username"></label>
        <input type="text" name="username" class="form-control" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label" id="lbl-password"></label>
        <input type="password" name="password" class="form-control" required autocomplete="new-password" />
        <div class="form-text" id="txt-min"></div>
      </div>
      <div class="mb-4">
        <label class="form-label" id="lbl-confirm"></label>
        <input type="password" name="password2" class="form-control" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-register" id="btn-submit"></button>
    </form>

    <a href="/login" class="link-login" id="lnk-login"></a>
  </div>

  <script>
    const STRINGS = {
      en: {
        title:    'Create an account',
        subtitle: 'Set up your access to Revenue Manager.',
        username: 'Username',
        password: 'Password',
        confirm:  'Confirm password',
        min:      'Minimum 6 characters',
        submit:   'Create my account',
        login:    'Already have an account? <span>Sign in</span>',
      },
      fr: {
        title:    'Créer un compte',
        subtitle: 'Configurez votre accès à Grocery Manager.',
        username: "Nom d'utilisateur",
        password: 'Mot de passe',
        confirm:  'Confirmer le mot de passe',
        min:      'Minimum 6 caractères',
        submit:   'Créer mon compte',
        login:    'Déjà un compte ? <span>Se connecter</span>',
      },
    };

    function switchLang(lang) {
      localStorage.setItem('rm-lang', lang);
      applyLang(lang);
    }

    function applyLang(lang) {
      const s = STRINGS[lang] || STRINGS['en'];
      document.getElementById('txt-title').textContent    = s.title;
      document.getElementById('txt-subtitle').textContent = s.subtitle;
      document.getElementById('lbl-username').textContent = s.username;
      document.getElementById('lbl-password').textContent = s.password;
      document.getElementById('lbl-confirm').textContent  = s.confirm;
      document.getElementById('txt-min').textContent      = s.min;
      document.getElementById('btn-submit').textContent   = s.submit;
      document.getElementById('lnk-login').innerHTML      = s.login;
      document.getElementById('lang-input').value         = lang;
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
    }

    const savedLang = localStorage.getItem('rm-lang') || 'en';
    applyLang(savedLang);
  </script>
</body>
</html>
