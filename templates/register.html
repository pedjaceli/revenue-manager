<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un compte — Revenue Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .form-label { color: #cbd5e1; font-size: 0.875rem; }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #6366f1;
      color: #f1f5f9;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .btn-register {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 0.6rem;
      width: 100%;
    }
    .btn-register:hover { background: #4f46e5; color: white; }
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .logo { color: #6366f1; font-size: 2rem; margin-bottom: 1rem; }
    .link-login {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      color: #94a3b8;
      font-size: 0.875rem;
      text-decoration: none;
    }
    .link-login span { color: #6366f1; }
    .link-login:hover span { text-decoration: underline; }
    .form-text { color: #64748b; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="bi bi-person-plus"></i></div>
    <h1>Créer un compte</h1>
    <p>Configure ton accès à Revenue Manager.</p>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="mb-3">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" required autofocus />
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" required />
        <div class="form-text">Minimum 6 caractères</div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" name="password2" class="form-control" required />
      </div>
      <button type="submit" class="btn-register">Créer mon compte</button>
    </form>

    <a href="/login" class="link-login">Déjà un compte ? <span>Se connecter</span></a>
  </div>
</body>
</html>
