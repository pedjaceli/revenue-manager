<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Revenue Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-card h1 {
      color: #f1f5f9;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .form-label { color: #cbd5e1; font-size: 0.875rem; }
    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      caret-color: #f1f5f9;
      border-radius: 8px;
    }
    .form-control:focus {
      background: #0f172a;
      border-color: #10b981;
      color: #f1f5f9;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .btn-primary-custom {
      background: #10b981;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 0.6rem;
      width: 100%;
    }
    .btn-primary-custom:hover { background: #059669; color: white; }
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .logo { color: #10b981; font-size: 2rem; margin-bottom: 1rem; }
    .step-badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #34d399;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
      -webkit-text-fill-color: #f1f5f9 !important;
      transition: background-color 9999s ease-in-out 0s;
    }
    @media (max-width: 575.98px) {
      .login-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo"><i class="bi bi-key"></i></div>
    <h1 id="txt-title"></h1>
    <p id="txt-subtitle"></p>

    {% if step == 1 %}
      <span class="step-badge" id="txt-step-badge"></span>

      {% if error %}
      <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
      {% endif %}

      <form method="POST" action="/forgot-password">
        <input type="hidden" name="step" value="1" />
        <div class="mb-4">
          <label class="form-label" id="lbl-username"></label>
          <input type="text" name="username" class="form-control" required autofocus />
        </div>
        <button type="submit" class="btn-primary-custom" id="btn-submit"></button>
      </form>

    {% elif step == 2 %}
      <span class="step-badge" id="txt-step-badge"></span>

      {% if error %}
      <div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
      {% endif %}

      <form method="POST" action="/forgot-password">
        <input type="hidden" name="step" value="2" />
        <input type="hidden" name="username" value="{{ username }}" />
        <div class="mb-3">
          <label class="form-label" id="lbl-new-pwd"></label>
          <input type="password" name="password" class="form-control" required autofocus autocomplete="new-password" />
        </div>
        <div class="mb-4">
          <label class="form-label" id="lbl-confirm-pwd"></label>
          <input type="password" name="password2" class="form-control" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary-custom" id="btn-submit"></button>
      </form>
    {% endif %}

    <a href="/login" id="lnk-back" style="display:block;text-align:center;margin-top:1.25rem;color:#94a3b8;font-size:0.875rem;text-decoration:none;"></a>
  </div>

  <script>
    const STEP = {{ step }};
    const USERNAME = "{{ username if step == 2 else '' }}";

    const STRINGS = {
      en: {
        title:       'Forgot password',
        step1_sub:   'Enter your username to reset your password.',
        step2_sub:   'Create a new password for <strong>{name}</strong>.',
        step_badge:  'Step {n} of 2',
        username:    'Username',
        new_pwd:     'New password',
        confirm_pwd: 'Confirm password',
        btn_step1:   'Continue',
        btn_step2:   'Reset password',
        back:        '← Back to login',
      },
      fr: {
        title:       'Mot de passe oublié',
        step1_sub:   'Saisissez votre nom d\'utilisateur pour réinitialiser votre mot de passe.',
        step2_sub:   'Créez un nouveau mot de passe pour <strong>{name}</strong>.',
        step_badge:  'Étape {n} sur 2',
        username:    'Nom d\'utilisateur',
        new_pwd:     'Nouveau mot de passe',
        confirm_pwd: 'Confirmer le mot de passe',
        btn_step1:   'Continuer',
        btn_step2:   'Réinitialiser le mot de passe',
        back:        '← Retour à la connexion',
      },
    };

    function applyLang(lang) {
      const s = STRINGS[lang] || STRINGS['en'];

      document.getElementById('txt-title').textContent = s.title;
      document.getElementById('txt-step-badge').textContent = s.step_badge.replace('{n}', STEP);
      document.getElementById('lnk-back').textContent = s.back;

      if (STEP === 1) {
        document.getElementById('txt-subtitle').textContent = s.step1_sub;
        document.getElementById('lbl-username').textContent  = s.username;
        document.getElementById('btn-submit').textContent    = s.btn_step1;
      } else {
        document.getElementById('txt-subtitle').innerHTML = s.step2_sub.replace('{name}', USERNAME);
        document.getElementById('lbl-new-pwd').textContent     = s.new_pwd;
        document.getElementById('lbl-confirm-pwd').textContent = s.confirm_pwd;
        document.getElementById('btn-submit').textContent      = s.btn_step2;
      }
    }

    const savedLang = localStorage.getItem('rm-lang') || 'en';
    applyLang(savedLang);
  </script>
</body>
</html>
